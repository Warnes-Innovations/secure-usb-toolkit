name: Build & Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller

      - name: Validate Python modules import cleanly
        run: |
          python3 -c "import ast; ast.parse(open('tui.py').read()); print('tui.py OK')"

      - name: Build Linux launcher with PyInstaller
        run: |
          pyinstaller --onedir --name SecureUSB --distpath dist tui.py

      - name: Generate checksums
        run: |
          cd dist
          find . -type f | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-usb-launcher-linux
          path: dist/
